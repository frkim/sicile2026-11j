<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Carte simplifiee de l'itineraire Sicile 2026</title>
  <desc id="desc">Carte stylisee de la Sicile presentant le trajet du road trip 2026, les villes etapes (nuits) et les lieux visites.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1d3850" flood-opacity="0.14"/>
    </filter>
    <filter id="island-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1d3850" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #17324c; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #4c6880; }
      .label { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #163047; }
      .small { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #4c6880; }
      .legend { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #163047; }
      .panel { fill: rgba(255,255,255,0.94); stroke: #d1dde6; stroke-width: 1.5; }
      .sea { fill: #dff0f7; }
      .island { fill: #f3ead4; stroke: #b69b66; stroke-width: 2; stroke-linejoin: round; }
      .route-back { fill: none; stroke: #f7ddcf; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
      .route { fill: none; stroke: #c65c35; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .overnight { fill: #c65c35; stroke: #fff7f0; stroke-width: 4; }
      .visit { fill: #2f7f97; stroke: #eef9fc; stroke-width: 4; }
      .airport { fill: #6b4f93; stroke: #f5f0ff; stroke-width: 4; }
      .num { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: white; text-anchor: middle; dominant-baseline: central; }
      .callout-line { stroke: #87a3b6; stroke-width: 1.5; stroke-dasharray: 4 4; }
      .compass { fill: #4c6880; }
    </style>
  </defs>

  <!-- Background sea -->
  <rect class="sea" width="1200" height="800"/>

  <!-- Title panel -->
  <g transform="translate(40 30)">
    <rect class="panel" x="0" y="0" width="540" height="76" rx="16"/>
    <text class="title" x="22" y="34">Road trip Sicile 2026</text>
    <text class="subtitle" x="22" y="58">Itineraire stylise : 12 nuits, 7 villes etapes</text>
  </g>

  <!-- Sicily simplified outline (stylized triangular shape with key capes) -->
  <g filter="url(#island-shadow)">
    <path class="island" d="
      M 145 159
      Q 200 145 270 152
      L 320 158
      Q 400 165 470 175
      Q 560 185 640 195
      Q 760 210 850 198
      Q 920 188 970 158
      L 985 155
      Q 990 175 970 205
      Q 950 240 925 270
      Q 900 305 875 350
      Q 860 395 855 445
      Q 855 510 870 565
      Q 870 605 825 645
      Q 780 660 740 645
      Q 700 625 660 598
      Q 600 575 545 555
      Q 480 535 415 510
      Q 350 480 290 440
      Q 230 400 180 360
      Q 130 315 95 270
      Q 70 230 80 200
      Q 100 175 145 159 Z
    "/>
  </g>

  <!-- Route (background halo + main line). Order: Palermo -> Cefalu -> Taormine -> Etna -> Taormine -> Catane -> Syracuse -> Noto -> Syracuse -> Modica -> Ragusa -> Agrigente -> (Scala dei Turchi) -> Trapani -> Zingaro -> Palermo aeroport -->
  <g>
    <path class="route-back" d="M 322 199 L 510 225 L 854 293 L 768 329 L 854 293 L 797 419 L 854 573 L 791 639 L 854 573 L 702 649 L 693 623 L 385 487 L 353 495 L 80 232 L 165 214 L 248 174"/>
    <path class="route"      d="M 322 199 L 510 225 L 854 293 L 768 329 L 854 293 L 797 419 L 854 573 L 791 639 L 854 573 L 702 649 L 693 623 L 385 487 L 353 495 L 80 232 L 165 214 L 248 174"/>
  </g>

  <!-- Markers and labels -->
  <g>
    <!-- Palermo airport (PMO) - departure/return -->
    <line class="callout-line" x1="248" y1="174" x2="270" y2="118"/>
    <circle class="airport" cx="248" cy="174" r="10"/>
    <text class="label" x="282" y="115">Palerme aeroport</text>
    <text class="small" x="282" y="133">arrivee / retour</text>

    <!-- 1. Palermo -->
    <circle class="overnight" cx="322" cy="199" r="13"/>
    <text class="num" x="322" y="199">1</text>
    <text class="label" x="340" y="190">Palerme</text>
    <text class="small" x="340" y="208">nuits 1 et 12</text>

    <!-- 2. Cefalu -->
    <circle class="overnight" cx="510" cy="225" r="13"/>
    <text class="num" x="510" y="225">2</text>
    <text class="label" x="528" y="216">Cefalu</text>
    <text class="small" x="528" y="234">nuits 2-3</text>

    <!-- 3. Taormine -->
    <circle class="overnight" cx="854" cy="293" r="13"/>
    <text class="num" x="854" y="293">3</text>
    <text class="label" x="872" y="284">Taormine</text>
    <text class="small" x="872" y="302">nuits 4-6</text>

    <!-- Etna (visit) -->
    <circle class="visit" cx="768" cy="329" r="11"/>
    <text class="label" x="640" y="324">Etna</text>
    <text class="small" x="640" y="342">excursion</text>

    <!-- Catane (visit) -->
    <circle class="visit" cx="797" cy="419" r="11"/>
    <text class="label" x="816" y="414">Catane</text>
    <text class="small" x="816" y="432">visite</text>

    <!-- 4. Syracuse -->
    <circle class="overnight" cx="854" cy="573" r="13"/>
    <text class="num" x="854" y="573">4</text>
    <text class="label" x="872" y="564">Syracuse</text>
    <text class="small" x="872" y="582">nuits 7-8</text>

    <!-- Noto (visit) -->
    <circle class="visit" cx="791" cy="639" r="11"/>
    <text class="label" x="810" y="634">Noto</text>
    <text class="small" x="810" y="652">excursion</text>

    <!-- Modica (visit) -->
    <circle class="visit" cx="702" cy="649" r="11"/>
    <text class="label" x="612" y="671">Modica</text>
    <text class="small" x="612" y="689">visite</text>

    <!-- 5. Ragusa -->
    <circle class="overnight" cx="693" cy="623" r="13"/>
    <text class="num" x="693" y="623">5</text>
    <text class="label" x="711" y="614">Ragusa</text>
    <text class="small" x="711" y="632">nuit 9</text>

    <!-- 6. Agrigente -->
    <circle class="overnight" cx="385" cy="487" r="13"/>
    <text class="num" x="385" y="487">6</text>
    <text class="label" x="403" y="478">Agrigente</text>
    <text class="small" x="403" y="496">nuit 10</text>

    <!-- Scala dei Turchi (visit) -->
    <circle class="visit" cx="353" cy="495" r="11"/>
    <line class="callout-line" x1="353" y1="495" x2="320" y2="540"/>
    <text class="label" x="170" y="540">Scala dei Turchi</text>
    <text class="small" x="170" y="558">visite</text>

    <!-- 7. Trapani -->
    <circle class="overnight" cx="80" cy="232" r="13"/>
    <text class="num" x="80" y="232">7</text>
    <text class="label" x="22" y="270">Trapani</text>
    <text class="small" x="22" y="288">nuit 11</text>

    <!-- Zingaro / Scopello (visit) -->
    <circle class="visit" cx="165" cy="214" r="11"/>
    <line class="callout-line" x1="165" y1="214" x2="160" y2="105"/>
    <text class="label" x="40" y="98">Zingaro / Scopello</text>
    <text class="small" x="40" y="116">randonnee</text>
  </g>

  <!-- Compass -->
  <g transform="translate(60 700)">
    <circle r="22" fill="#ffffff" stroke="#d1dde6" stroke-width="1.5"/>
    <path class="compass" d="M 0 -16 L 5 0 L 0 16 L -5 0 Z"/>
    <text class="small" x="0" y="-26" text-anchor="middle">N</text>
  </g>

  <!-- Legend panel -->
  <g transform="translate(900 40)" filter="url(#shadow)">
    <rect class="panel" x="0" y="0" width="260" height="200" rx="14"/>
    <text class="legend" x="20" y="32">Legende</text>
    <circle class="overnight" cx="24" cy="64" r="11"/>
    <text class="small" x="46" y="69">Ville ou vous dormez</text>
    <circle class="visit" cx="24" cy="96" r="11"/>
    <text class="small" x="46" y="101">Site visite (sans nuit)</text>
    <circle class="airport" cx="24" cy="128" r="10"/>
    <text class="small" x="46" y="133">Aeroport</text>
    <line x1="12" y1="162" x2="40" y2="162" class="route"/>
    <text class="small" x="46" y="167">Trajet du road trip</text>
    <text class="small" x="20" y="190">Carte stylisee, non a l'echelle.</text>
  </g>
</svg>
